<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ОИиКТ АТС — Контакты</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="container header-container">
        <h1 class="logo">ОИиКТ АТС</h1>
        <nav>
            <a href="index.html">Главная</a>
            <a href="about.html">О нас</a>
            <a href="services.html">Услуги</a>
            <a href="contacts.html">Контакты</a>
        </nav>
    </div>
</header>

<section class="section">
    <div class="container">
        <h2>Связь с отделом</h2>

        <form id="contactForm">
            <input type="text" id="name" placeholder="Имя">
            <input type="email" id="email" placeholder="Email">
            <textarea id="message" placeholder="Сообщение"></textarea>
            <button type="submit" class="btn">Отправить</button>
        </form>

        <div class="map">
            <iframe
                src="https://www.google.com/maps?q=Каспийск&output=embed"
                width="100%"
                height="300"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <p>АО «Дагдизель», г. Каспийск</p>
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
